{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
.fc-wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
}
.fc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
}
.fc-counter {
    font-size: 1.1rem;
    color: var(--primary-color);
    font-weight: 700;
}
.fc-mode-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    cursor: pointer;
    font-size: 0.9rem;
}
.fc-mode-toggle input { margin: 0; cursor: pointer; }
.fc-mode-toggle.active {
    background: #fef3c7;
    border-color: #f59e0b;
    color: #92400e;
}
.fc-card-container {
    perspective: 1500px;
    margin: 2rem 0;
}
.fc-card {
    position: relative;
    width: 100%;
    min-height: 320px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,.0,.2,1);
}
.fc-card.flipped { transform: rotateX(180deg); }
.fc-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: #ffffff;
    border-radius: 12px;
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
    border: 1px solid #e5e7eb;
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
.fc-face .label {
    position: absolute;
    top: 1.25rem;
    left: 1.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: #9ca3af;
}
.fc-face .text {
    font-size: 1.8rem;
    font-weight: 500;
    line-height: 1.5;
    color: #111111;
}
.fc-back { transform: rotateX(180deg); }

/* 별표 — 카드 우상단에 표시. 카드 뒤집어도 같은 위치 (양면) */
.fc-star {
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    background: none;
    border: 0;
    font-size: 2rem;
    color: #d1d5db;
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s ease;
    z-index: 2;
}
.fc-star:hover { transform: scale(1.15); }
.fc-star.on { color: #f59e0b; }

.fc-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-top: 1rem;
}
.fc-progress {
    flex: 1;
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    overflow: hidden;
}
.fc-progress .bar { height: 100%; background: var(--primary-color); transition: width .3s; }

.fc-empty {
    text-align: center;
    padding: 4rem 2rem;
    color: #6b7280;
    background: white;
    border-radius: 16px;
    border: 2px dashed #e5e7eb;
}
</style>

<div class="fc-wrap">
    <a href="{% url 'writing:home' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i>영작훈련 홈</a>

    <div class="fc-header">
        <h3 class="mb-0"><i class="fas fa-book-open me-2"></i>{{ unit.title }} — 학습하기</h3>
        <div class="d-flex align-items-center gap-3">
            <label class="fc-mode-toggle" id="starModeToggle">
                <input type="checkbox" id="starOnlyCb">
                <span>⭐ 별표만 (<span id="starCount">0</span>)</span>
            </label>
            <div class="fc-counter"><span id="fcCounter">1</span> / <span id="fcTotal">{{ total }}</span></div>
        </div>
    </div>

    <div id="fcMain">
        <div class="fc-card-container">
            <div class="fc-card" id="fcCard">
                <button class="fc-star" id="fcStar" onclick="toggleStar(event)" aria-label="별표">☆</button>
                <div class="fc-face fc-front">
                    <div class="label">한글</div>
                    <div class="text" id="fcKorean">불러오는 중...</div>
                </div>
                <div class="fc-face fc-back">
                    <div class="label">English</div>
                    <div class="text" id="fcEnglish"></div>
                </div>
            </div>
        </div>

        <div class="fc-controls">
            <button class="btn btn-outline-secondary" id="fcPrev" onclick="prevCard()">
                <i class="fas fa-chevron-left me-1"></i>이전
            </button>
            <div class="fc-progress"><div class="bar" id="fcBar" style="width: 0%"></div></div>
            <button class="btn btn-primary" id="fcNext" onclick="nextCard()">
                다음<i class="fas fa-chevron-right ms-1"></i>
            </button>
        </div>
    </div>

    <div id="fcEmpty" class="fc-empty" style="display:none;">
        <div style="font-size: 3rem;">⭐</div>
        <h4 class="mt-2">별표한 카드가 없어요</h4>
        <p class="mb-0">카드 우상단의 별표를 눌러 표시해보세요.</p>
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'writing:start_session' unit.id %}" class="btn btn-success btn-lg">
            <i class="fas fa-bullseye me-1"></i>학습 끝났어요 — 실전 TEST 도전!
        </a>
    </div>
</div>

<script>
const ALL_CARDS = {{ cards_json|safe }};
const UNIT_ID = {{ unit.id }};
const STAR_KEY = `flashcard_starred_${UNIT_ID}`;

let starred = new Set(JSON.parse(localStorage.getItem(STAR_KEY) || '[]'));
let starOnly = false;
let visible = ALL_CARDS.slice();
let idx = 0;

function saveStarred() {
    localStorage.setItem(STAR_KEY, JSON.stringify([...starred]));
    document.getElementById('starCount').textContent = starred.size;
}

function rebuildVisible() {
    if (starOnly) {
        visible = ALL_CARDS.filter(c => starred.has(c.index));
    } else {
        visible = ALL_CARDS.slice();
    }
    if (idx >= visible.length) idx = Math.max(0, visible.length - 1);
    render();
}

function render() {
    const main = document.getElementById('fcMain');
    const empty = document.getElementById('fcEmpty');
    document.getElementById('fcTotal').textContent = visible.length;
    if (visible.length === 0) {
        main.style.display = 'none';
        empty.style.display = '';
        return;
    }
    main.style.display = '';
    empty.style.display = 'none';

    const c = visible[idx];
    document.getElementById('fcKorean').textContent = c.korean;
    document.getElementById('fcEnglish').textContent = c.english;
    document.getElementById('fcCounter').textContent = idx + 1;
    document.getElementById('fcCard').classList.remove('flipped');
    const pct = ((idx + 1) / visible.length) * 100;
    document.getElementById('fcBar').style.width = pct + '%';
    document.getElementById('fcPrev').disabled = idx === 0;
    document.getElementById('fcNext').disabled = idx === visible.length - 1;

    // 별표 상태
    const star = document.getElementById('fcStar');
    if (starred.has(c.index)) {
        star.textContent = '★';
        star.classList.add('on');
    } else {
        star.textContent = '☆';
        star.classList.remove('on');
    }
}

function flipCard() {
    if (visible.length === 0) return;
    document.getElementById('fcCard').classList.toggle('flipped');
}
function nextCard() {
    if (idx < visible.length - 1) { idx++; render(); }
}
function prevCard() {
    if (idx > 0) { idx--; render(); }
}
function toggleStar(e) {
    e.stopPropagation();
    if (visible.length === 0) return;
    const c = visible[idx];
    if (starred.has(c.index)) starred.delete(c.index);
    else starred.add(c.index);
    saveStarred();
    if (starOnly) rebuildVisible();
    else render();
}

document.getElementById('starOnlyCb').addEventListener('change', e => {
    starOnly = e.target.checked;
    document.getElementById('starModeToggle').classList.toggle('active', starOnly);
    idx = 0;
    rebuildVisible();
});

document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        flipCard();
    } else if (e.key === 'ArrowRight') {
        nextCard();
    } else if (e.key === 'ArrowLeft') {
        prevCard();
    } else if (e.key === 's' || e.key === 'S') {
        toggleStar({ stopPropagation: () => {} });
    }
});

// 카드 탭/클릭 + 스와이프 (모바일·태블릿)
(function () {
    const card = document.getElementById('fcCard');
    const SWIPE_THRESHOLD = 50;  // px
    let startX = 0, startY = 0, swiped = false;

    card.addEventListener('touchstart', e => {
        // 별표 버튼은 별도 처리
        if (e.target.closest('.fc-star')) return;
        swiped = false;
        const t = e.changedTouches[0];
        startX = t.clientX;
        startY = t.clientY;
    }, { passive: true });

    card.addEventListener('touchend', e => {
        if (e.target.closest('.fc-star')) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
            return;  // 작은 움직임은 탭으로 간주 — click 이벤트가 처리
        }
        swiped = true;
        if (Math.abs(dx) > Math.abs(dy)) {
            // 가로 스와이프 — 좌(다음) / 우(이전)
            if (dx < 0) nextCard();
            else prevCard();
        } else {
            // 세로 스와이프 — 뒤집기
            flipCard();
        }
    }, { passive: true });

    card.addEventListener('click', e => {
        if (e.target.closest('.fc-star')) return;
        if (swiped) { swiped = false; return; }
        flipCard();
    });
})();

// 초기 렌더
saveStarred();
rebuildVisible();

// 실시간 모니터용 heartbeat — 3초마다, 현재 카드 위치 전송
(function() {
    const FC_CSRF = (function() {
        const m = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
        return m ? m[1] : '';
    })();
    async function ping() {
        try {
            await fetch('{% url "writing:flashcard_heartbeat" %}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': FC_CSRF },
                credentials: 'same-origin',
                keepalive: true,
                body: JSON.stringify({
                    unit_id: UNIT_ID,
                    current_index: idx,
                    total: visible.length,
                }),
            });
        } catch (e) { /* silent */ }
    }
    ping();
    setInterval(ping, 3000);
    // 탭이 다시 활성화되면 즉시 한 번
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') ping();
    });
})();
</script>
{% endblock %}
