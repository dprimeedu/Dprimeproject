{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* ─── 풀이 화면 전용 스타일 ─── */
    .play-wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 1.5rem 1rem;
    }

    /* 상단 상태 바 */
    .status-bar {
        background: white;
        border-radius: 12px;
        padding: 1rem 1.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,.06);
        margin-bottom: 1.5rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 1rem;
        align-items: center;
    }

    .stat-box { text-align: center; }
    .stat-box .label { font-size: .75rem; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
    .stat-box .value { font-size: 1.4rem; font-weight: 700; color: var(--primary-color); }

    .progress-mini { height: 6px; background: #ede9fe; border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .progress-mini .bar { height: 100%; background: var(--primary-color); transition: width .3s; }

    .combo-display {
        font-size: 1.5rem;
        font-weight: 800;
        color: #f59e0b;
        text-align: center;
        min-height: 1.8em;
    }
    .combo-display.hot { color: #ef4444; animation: pulse 0.5s ease infinite alternate; }
    @keyframes pulse {
        from { transform: scale(1); }
        to   { transform: scale(1.1); }
    }

    /* 문제 영역 */
    .problem-area {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 2px 8px rgba(0,0,0,.06);
        min-height: 400px;
    }

    .problem-counter {
        font-size: .9rem;
        color: #6b7280;
        margin-bottom: .5rem;
    }
    .korean-text {
        font-size: 1.3rem;
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 2rem;
        line-height: 1.5;
    }

    /* 단어 입력 */
    .words-row {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem 1rem;
        line-height: 2;
    }

    .word-cell {
        position: relative;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        margin-top: 30px;
    }

    .word-feedback {
        position: absolute;
        top: -28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: .85rem;
        font-weight: 700;
        white-space: nowrap;
        min-height: 1em;
    }
    .word-feedback.perfect { color: var(--primary-color); font-weight: 800; }
    .word-feedback.great   { color: #10b981; font-weight: 800; }       /* 초록 */
    .word-feedback.good    { color: #3b82f6; font-weight: 800; }       /* 파랑 */
    .word-feedback.boo     { color: #ef4444; font-weight: 800; }       /* 빨강 (답 공개) */
    .word-feedback.x { color: #ef4444; font-size: 1rem; }
    .word-feedback.hint-korean { color: #6b7280; font-weight: 500; font-size: .8rem; }
    .word-feedback.hint-letter { color: #f59e0b; font-family: monospace; font-size: 1rem; letter-spacing: 2px; }
    .word-feedback.answer { color: #ef4444; text-decoration: underline; font-weight: 700; }
    .word-feedback.near-miss {
        font-family: monospace;
        font-size: 1.05rem;
        letter-spacing: 1.5px;
        font-weight: 800;
    }
    .word-feedback.near-miss .near-ok { color: #6b7280; }
    .word-feedback.near-miss .near-x  { color: #ef4444; }

    .word-input {
        border: none;
        border-bottom: 2px solid #d1d5db;
        padding: 8px 10px;
        width: 110px;
        text-align: center;
        font-size: 1.05rem;
        background: transparent;
        transition: all .2s ease;
        font-family: inherit;
    }
    .word-input:focus { outline: none; border-bottom-color: var(--primary-color); }
    .word-input.is-correct {
        color: #10b981; border-bottom-color: #10b981;
        font-weight: 700; background: rgba(16,185,129,.08); border-radius: 4px;
    }
    .word-input.is-wrong { color: #ef4444; border-bottom-color: #ef4444; }
    .word-input.is-revealed {
        color: #ef4444; border-bottom-color: #ef4444; background: rgba(239,68,68,.05);
    }
    .word-input:disabled { opacity: .9; cursor: not-allowed; }

    /* 단어 점수 표시 */
    .word-score {
        position: absolute;
        top: -50px;
        left: 50%;
        transform: translateX(-50%);
        color: #10b981;
        font-weight: 700;
        font-size: .9rem;
        opacity: 0;
        animation: scorePop 1.5s ease forwards;
    }
    @keyframes scorePop {
        0%   { opacity: 0; transform: translate(-50%, 0); }
        20%  { opacity: 1; transform: translate(-50%, -10px); }
        100% { opacity: 0; transform: translate(-50%, -30px); }
    }

    /* 자동 채우기 단어 (관사 등) */
    .word-input.is-auto {
        color: #6b7280;
        border-bottom-color: #d1d5db;
        background: rgba(156,163,175,.08);
        border-radius: 4px;
        font-weight: 500;
    }

    /* 보상 인라인 토스트 (학습 영역 가리지 않음) */
    .reward-rail {
        margin-top: 1rem;
        min-height: 2.2rem;
        display: flex;
        flex-direction: column;
        gap: .35rem;
        align-items: stretch;
    }
    .reward-toast {
        background: linear-gradient(90deg, rgba(124,58,237,.10), rgba(167,139,250,.10));
        border-left: 4px solid var(--primary-color);
        color: #4c1d95;
        padding: .55rem .9rem;
        border-radius: 8px;
        font-weight: 600;
        font-size: .95rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity .2s ease, transform .2s ease;
    }
    .reward-toast.show { opacity: 1; transform: translateY(0); }
    .reward-toast .sub { font-weight: 500; opacity: .85; font-size: .85rem; }
    .reward-toast.combo  { border-left-color: #f59e0b; color: #92400e; background: linear-gradient(90deg, rgba(245,158,11,.10), rgba(252,211,77,.10)); }
    .reward-toast.level  { border-left-color: #10b981; color: #065f46; background: linear-gradient(90deg, rgba(16,185,129,.10), rgba(110,231,183,.10)); }
    .reward-toast.badge  { border-left-color: #ef4444; color: #991b1b; background: linear-gradient(90deg, rgba(239,68,68,.10), rgba(252,165,165,.10)); }

    /* 다음 버튼 */
    #nextBtn, #retryBtn {
        padding: 1rem 2.5rem;
        font-size: 1.05rem;
        font-weight: 700;
    }
    #sentenceResult.pass { background: rgba(16,185,129,.10); border-left: 4px solid #10b981; color: #065f46; }
    #sentenceResult.fail { background: rgba(239,68,68,.10);  border-left: 4px solid #ef4444; color: #991b1b; }
    #sentenceResult .pct { font-size: 1.6rem; font-weight: 800; }

    /* 진행도 바 */
    .progress-overall {
        background: #e5e7eb;
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 1rem;
    }
    .progress-overall .bar { height: 100%; background: var(--primary-color); transition: width .3s; }

    /* 리더보드 */
    .leaderboard {
        background: white;
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,.06);
        margin-top: 1.5rem;
    }
    .leaderboard h5 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
        color: var(--primary-color);
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .lb-row {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        margin-bottom: 0.25rem;
    }
    .lb-row .rank {
        font-weight: 700;
        font-size: 1.1rem;
        text-align: center;
    }
    .lb-row .name { font-weight: 500; }
    .lb-row .score { font-weight: 600; color: var(--primary-color); }
    .lb-row.rank-1 { background: linear-gradient(90deg, #fef3c7, transparent); }
    .lb-row.rank-1 .rank { color: #f59e0b; }
    .lb-row.rank-2 .rank { color: #9ca3af; }
    .lb-row.rank-3 .rank { color: #b45309; }
    .lb-row.is-me {
        background: rgba(124, 58, 237, 0.08);
        border-left: 3px solid var(--primary-color);
    }
    .lb-me-line {
        margin-top: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px dashed #e5e7eb;
        font-size: 0.9rem;
        color: #6b7280;
        text-align: center;
    }

    .target-time-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        background: #ede9fe;
        color: var(--primary-color);
        font-size: 0.8rem;
        font-weight: 600;
        margin-left: 0.5rem;
    }
</style>

<div class="play-wrap">
    <!-- 진행도 -->
    <div class="progress-overall">
        <div class="bar" id="progressBar" style="width: 0%"></div>
    </div>

    <!-- 상태 바 -->
    <div class="status-bar">
        <div class="d-flex gap-3">
            <div class="stat-box">
                <div class="label">점수</div>
                <div class="value" id="scoreVal">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Lv {{ profile.level }} {{ profile.title }}</div>
                <div class="value" id="xpVal">{{ profile.xp_in_current_level }}/100</div>
                <div class="progress-mini"><div class="bar" id="xpBar" style="width: {{ profile.xp_in_current_level }}%"></div></div>
            </div>
        </div>
        <div class="combo-display" id="comboDisplay">&nbsp;</div>
        <div class="text-end">
            <div class="label small text-muted">
                {{ unit.title }}
                <span class="target-time-badge" title="이 시간 안에 완료하면 +100점 보너스">
                    🎯 목표 <span id="targetTime">--</span>
                </span>
            </div>
            <div class="value" id="problemCounter">1 / {{ total_problems }}</div>
            <div class="label small text-muted" style="margin-top:.25rem;">경과 <span id="elapsedTime">0:00</span></div>
        </div>
    </div>

    <!-- 리더보드 (상단) — 동기부여용으로 풀이 화면 위에 노출 -->
    <div class="leaderboard" id="leaderboardBox" style="display:none;">
        <h5>🏆 단원 리더보드 — {{ unit.title }}</h5>
        <div id="leaderboardBody"></div>
    </div>

    <!-- 문제 영역 -->
    <div class="problem-area">
        <div class="problem-counter" id="problemNumber">Q1.</div>
        <div class="korean-text" id="koreanText">불러오는 중...</div>
        <div class="words-row" id="wordsRow"></div>
        <!-- 보상 인라인 영역 (학습 영역 아래) -->
        <div class="reward-rail" id="rewardRail"></div>
        <div id="sentenceResult" style="display:none; margin-top:1rem; padding:1rem; border-radius:8px;"></div>
        <div id="actionRow" style="display:none; margin-top:1rem; display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap;">
            <button id="retryBtn" class="btn btn-warning" onclick="retryProblem()" style="display:none;">
                <i class="fas fa-redo me-1"></i>다시 풀어보기
            </button>
            <button id="nextBtn" class="btn btn-primary" onclick="nextProblem()" style="display:none;">
                다음 문제로 ➔ (Enter)
            </button>
        </div>
    </div>
</div>

<form style="display:none">{% csrf_token %}</form>

<script>
const SESSION_ID = {{ session.id }};
const UNIT_ID = {{ unit.id }};
const TOTAL_PROBLEMS = {{ total_problems }};
const PROBLEMS = {{ problems_json|safe }};
const CSRF_TOKEN = document.querySelector('[name=csrfmiddlewaretoken]').value;
const SESSION_STARTED_AT = Date.now();
const TARGET_SECONDS = {{ unit.computed_target_seconds }};

// 경과 시간 표시
function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
}
document.getElementById('targetTime').textContent = fmtTime(TARGET_SECONDS);

setInterval(() => {
    const el = document.getElementById('elapsedTime');
    if (!el) return;
    const sec = Math.floor((Date.now() - SESSION_STARTED_AT) / 1000);
    el.textContent = fmtTime(sec);
    if (sec > TARGET_SECONDS) el.style.color = '#ef4444';
}, 1000);

// 리더보드
async function refreshLeaderboard() {
    try {
        const r = await fetch(`/training/writing/api/leaderboard/${UNIT_ID}/`, { credentials: 'same-origin' });
        if (!r.ok) return;
        const data = await r.json();
        const box = document.getElementById('leaderboardBox');
        const body = document.getElementById('leaderboardBody');
        const medals = ['🥇', '🥈', '🥉'];
        let html = '';
        if (data.top.length === 0) {
            html = '<div class="text-muted small text-center py-2">아직 완료한 학생이 없어요. 첫 도전자가 되어보세요!</div>';
        } else {
            data.top.forEach(t => {
                html += `<div class="lb-row rank-${t.rank} ${t.is_me ? 'is-me' : ''}">
                    <div class="rank">${medals[t.rank-1] || t.rank}</div>
                    <div class="name">${t.name}${t.is_me ? ' (나)' : ''}</div>
                    <div class="score">${t.score}점</div>
                </div>`;
            });
        }
        const inTop = data.top.some(t => t.is_me);
        if (!inTop && data.me_rank) {
            html += `<div class="lb-me-line">내 최고 기록: ${data.me_rank}위 · ${data.me_best}점</div>`;
        } else if (!inTop && data.me_best == null) {
            html += `<div class="lb-me-line">아직 완료한 적이 없어요 — 끝까지 풀면 순위 등록!</div>`;
        }
        body.innerHTML = html;
        box.style.display = '';
    } catch (e) { console.error('[leaderboard]', e); }
}
refreshLeaderboard();

const RETRY_LIMIT = 3;

let currentProblemIdx = 0;
let wordTimeStart = {};  // {wordIdx: timestamp}
let wordStates = {};     // {wordIdx: {done, attempt, hintLevel}}

function $(id) { return document.getElementById(id); }

// 인라인 보상 토스트 (학습 영역 아래에 잠깐 표시, 화면 안 가림)
function showReward(text, sub, type) {
    const rail = $('rewardRail');
    if (!rail) return;
    const el = document.createElement('div');
    el.className = 'reward-toast' + (type ? ' ' + type : '');
    el.innerHTML = `<span>${text}</span>` + (sub ? `<span class="sub">${sub}</span>` : '');
    rail.prepend(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 250);
    }, 2200);
}

function clearRewards() {
    const rail = $('rewardRail');
    if (rail) rail.innerHTML = '';
}

function updateStatusFromResponse(data) {
    if (data.total_score !== undefined) $('scoreVal').textContent = data.total_score;
    if (data.xp_in_level !== undefined) {
        $('xpVal').textContent = data.xp_in_level + '/100';
        $('xpBar').style.width = data.xp_in_level + '%';
    }
    if (data.current_word_combo !== undefined) {
        const cd = $('comboDisplay');
        if (data.current_word_combo >= 2) {
            cd.textContent = '🔥 ' + data.current_word_combo + ' COMBO';
            cd.classList.toggle('hot', data.current_word_combo >= 5);
        } else {
            cd.innerHTML = '&nbsp;';
            cd.classList.remove('hot');
        }
    }
    if (data.combo_bonus && data.combo_bonus > 0) {
        showReward('🔥 ' + data.current_word_combo + ' COMBO!', '+' + data.combo_bonus + ' 보너스', 'combo');
    }
    if (data.level_up) {
        showReward('🎉 LEVEL UP!', 'Lv ' + data.level + ' ' + data.title, 'level');
    }
    if (data.badges_earned && data.badges_earned.length > 0) {
        data.badges_earned.forEach(b => {
            showReward(b.icon + ' ' + b.name, b.description, 'badge');
        });
    }
}

function loadProblem(idx) {
    if (idx >= PROBLEMS.length) {
        finishSession();
        return;
    }
    currentProblemIdx = idx;
    wordStates = {};
    wordTimeStart = {};
    clearRewards();

    const p = PROBLEMS[idx];
    $('problemNumber').textContent = 'Q' + (idx + 1) + '.';
    $('koreanText').textContent = p.korean;
    $('problemCounter').textContent = (idx + 1) + ' / ' + TOTAL_PROBLEMS;
    $('progressBar').style.width = ((idx) / TOTAL_PROBLEMS * 100) + '%';
    $('nextBtn').style.display = 'none';
    $('retryBtn').style.display = 'none';
    $('sentenceResult').style.display = 'none';
    $('actionRow').style.display = 'none';

    const row = $('wordsRow');
    row.innerHTML = '';

    const wordsMeta = p.words || [];
    let firstFocusIdx = -1;

    for (let i = 0; i < p.word_count; i++) {
        const meta = wordsMeta[i] || { auto: false };
        const cell = document.createElement('div');
        cell.className = 'word-cell';

        const fb = document.createElement('div');
        fb.className = 'word-feedback';
        fb.id = 'fb' + i;
        fb.innerHTML = '&nbsp;';

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'word-input';
        inp.id = 'w' + i;
        inp.dataset.idx = i;
        inp.autocomplete = 'off';
        inp.spellcheck = false;

        cell.appendChild(fb);
        cell.appendChild(inp);
        row.appendChild(cell);

        if (meta.auto) {
            // 자동 채우기 단어 (관사 등): 미리 채우고 잠금 (라벨 표시 없음)
            inp.value = meta.value || '';
            inp.disabled = true;
            inp.classList.add('is-auto');
            wordStates[i] = { done: true, attempt: 1, hintLevel: 0, auto: true };
            // 백그라운드 서버 등록 (점수/통계 일관성 유지). 응답은 무시.
            autoSubmitWord(i, meta.value || '');
        } else {
            inp.addEventListener('focus', () => {
                if (!wordTimeStart[i]) wordTimeStart[i] = Date.now();
            });
            inp.addEventListener('keydown', (e) => {
                if (e.isComposing || e.keyCode === 229) return;
                if (e.key === 'Tab' || e.key === 'Enter') {
                    e.preventDefault();
                    submitWord(i);
                }
            });
            wordStates[i] = { done: false, attempt: 0, hintLevel: 0 };
            if (firstFocusIdx === -1) firstFocusIdx = i;
        }
    }

    // 첫 비-자동 단어로 즉시 포커스 (지연 제거)
    if (firstFocusIdx >= 0) {
        $('w' + firstFocusIdx)?.focus();
    } else {
        // 모든 단어가 자동인 경우 → 바로 완료 처리
        onAllWordsDone();
    }
}

// 자동 채우기 단어를 서버에 등록 (auto:true → 점수 0)
async function autoSubmitWord(wordIdx, value) {
    try {
        await fetch('{% url "writing:api_check_word" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({
                session_id: SESSION_ID,
                problem_id: PROBLEMS[currentProblemIdx].id,
                word_index: wordIdx,
                input: value,
                time_taken_seconds: 0,
                auto: true,
            }),
        });
    } catch (e) { /* silent */ }
}

async function submitWord(wordIdx) {
    const state = wordStates[wordIdx];
    if (!state || state.done) {
        focusNext(wordIdx);
        return;
    }
    const inp = $('w' + wordIdx);
    const val = (inp.value || '').trim();

    const startTime = wordTimeStart[wordIdx] || Date.now();
    const timeTaken = Math.round((Date.now() - startTime) / 1000);

    try {
        const r = await fetch('{% url "writing:api_check_word" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({
                session_id: SESSION_ID,
                problem_id: PROBLEMS[currentProblemIdx].id,
                word_index: wordIdx,
                input: val,
                time_taken_seconds: timeTaken,
            }),
        });
        if (!r.ok) {
            console.warn('check-word failed', r.status);
            return;
        }
        const data = await r.json();
        applyWordResponse(wordIdx, data);
    } catch (e) {
        console.error(e);
    }
}

function applyWordResponse(wordIdx, data) {
    const inp = $('w' + wordIdx);
    const fb  = $('fb' + wordIdx);
    const state = wordStates[wordIdx];

    if (data.is_correct) {
        inp.disabled = true;
        inp.classList.remove('is-wrong');
        inp.classList.add('is-correct');
        // 시도 횟수에 따라 라벨 변경
        if (data.attempt_num === 1) {
            fb.textContent = 'PERFECT!';
            fb.className = 'word-feedback perfect';
        } else if (data.attempt_num === 2) {
            fb.textContent = 'GREAT';
            fb.className = 'word-feedback great';
        } else {
            fb.textContent = 'GOOD';
            fb.className = 'word-feedback good';
        }
        state.done = true;

        if (data.score_earned > 0) {
            const sc = document.createElement('div');
            sc.className = 'word-score';
            sc.textContent = '+' + data.score_earned;
            inp.parentElement.appendChild(sc);
            setTimeout(() => sc.remove(), 1500);
        }
    } else {
        state.attempt = data.attempt_num;
        if (data.word_done) {
            // 3차에서 답 공개됨
            inp.disabled = true;
            inp.classList.remove('is-wrong');
            inp.classList.add('is-revealed');
            inp.value = data.next_hint?.content || '';
            fb.textContent = 'BOO~';
            fb.className = 'word-feedback boo';
            state.done = true;
        } else {
            inp.classList.add('is-wrong');
            inp.value = '';
            const hint = data.next_hint;
            if (hint && hint.type === 'near_miss' && hint.content) {
                // 70%+ 정답 매칭 — 학생 친 부분 회색 + 빠진/틀린 글자 빨강
                const correct = hint.content;
                const student = (hint.student || '');
                let html = '';
                for (let i = 0; i < correct.length; i++) {
                    const c = correct[i];
                    const s = student[i] || '';
                    if (s && s.toLowerCase() === c.toLowerCase()) {
                        html += '<span class="near-ok">' + c + '</span>';
                    } else {
                        html += '<span class="near-x">' + c + '</span>';
                    }
                }
                fb.innerHTML = html;
                fb.className = 'word-feedback near-miss';
            } else if (hint && hint.content && hint.type === 'korean_meaning') {
                fb.textContent = hint.content;
                fb.className = 'word-feedback hint-korean';
            } else if (hint && hint.content && hint.type === 'first_letter') {
                fb.textContent = hint.content;
                fb.className = 'word-feedback hint-letter';
            } else {
                fb.textContent = '✗ 다시';
                fb.className = 'word-feedback x';
            }
            wordTimeStart[wordIdx] = Date.now();
            inp.focus();
        }
    }

    updateStatusFromResponse(data);

    if (state.done) {
        const allDone = Object.values(wordStates).every(s => s.done);
        if (allDone) {
            onAllWordsDone();
        } else {
            focusNext(wordIdx);
        }
    }
}

function focusNext(fromIdx) {
    for (let j = fromIdx + 1; j < Object.keys(wordStates).length; j++) {
        if (!wordStates[j].done) {
            $('w' + j)?.focus();
            return;
        }
    }
    // 뒤로 못 가면 앞부터 다시
    for (let j = 0; j < fromIdx; j++) {
        if (!wordStates[j].done) {
            $('w' + j)?.focus();
            return;
        }
    }
}

async function onAllWordsDone() {
    let data = null;
    try {
        const r = await fetch('{% url "writing:api_complete_problem" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({
                session_id: SESSION_ID,
                problem_id: PROBLEMS[currentProblemIdx].id,
            }),
        });
        if (r.ok) {
            data = await r.json();
            updateStatusFromResponse({
                total_score: data.total_score,
                xp_in_level: data.xp_in_level,
                level: data.level,
                title: data.title,
                badges_earned: data.badges_earned,
            });
            if (data.was_perfect_sentence) {
                showReward('✨ PERFECT SENTENCE!', '+' + (data.perfect_bonus + data.sentence_combo_bonus) + ' 보너스');
            } else if (data.forfeit) {
                showReward(
                    '⚠️ 이번 문장 0점',
                    '너무 빠르게 통과 (평균 ' + data.avg_time_per_attempt + '초/시도)',
                    'badge'
                );
            }
        }
    } catch (e) { console.error(e); }

    // 점수 결과 표시 + 합격/불합격 액션
    const result = $('sentenceResult');
    const actionRow = $('actionRow');
    const nextBtn = $('nextBtn');
    const retryBtn = $('retryBtn');

    if (data) {
        const pct = data.sentence_pct;
        const threshold = data.pass_threshold;
        if (data.passed) {
            result.className = 'pass';
            result.innerHTML = `✅ <span class="pct">${pct}점</span> &nbsp; 합격 (기준 ${threshold}점)`;
        } else {
            result.className = 'fail';
            result.innerHTML = `📚 <span class="pct">${pct}점</span> &nbsp; 합격 기준(${threshold}점) 미달 — 다시 풀어보세요`;
        }
        result.style.display = 'block';
        actionRow.style.display = 'flex';

        if (data.passed) {
            // 합격 시 재시도 숨김 (점수 farming 방지)
            nextBtn.style.display = 'inline-block';
            retryBtn.style.display = 'none';
            nextBtn.focus();
        } else {
            // 불합격 시 재시도 강조 + 다음 진행도 허용
            retryBtn.style.display = 'inline-block';
            nextBtn.style.display = 'inline-block';
            retryBtn.focus();
        }
    } else {
        // 응답 못 받으면 일단 다음으로
        actionRow.style.display = 'flex';
        nextBtn.style.display = 'inline-block';
        nextBtn.focus();
    }
}

async function retryProblem() {
    try {
        const r = await fetch('{% url "writing:api_reset_problem" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({
                session_id: SESSION_ID,
                problem_id: PROBLEMS[currentProblemIdx].id,
            }),
        });
        if (r.ok) {
            const data = await r.json();
            updateStatusFromResponse({
                total_score: data.total_score,
                xp_in_level: data.xp_in_level,
                level: data.level,
                title: data.title,
            });
        }
    } catch (e) { console.error(e); }
    // 화면 reset
    $('sentenceResult').style.display = 'none';
    $('actionRow').style.display = 'none';
    $('nextBtn').style.display = 'none';
    $('retryBtn').style.display = 'none';
    loadProblem(currentProblemIdx);
}

async function finishSession() {
    try {
        const r = await fetch('{% url "writing:api_complete_session" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
            body: JSON.stringify({ session_id: SESSION_ID }),
        });
        const data = await r.json();
        window.location.href = data.redirect_url;
    } catch (e) {
        console.error(e);
        window.location.href = '/training/writing/result/' + SESSION_ID + '/';
    }
}

function nextProblem() {
    loadProblem(currentProblemIdx + 1);
}

// Enter 키로 다음 문제 (모든 단어 done 상태일 때)
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && $('nextBtn').style.display === 'block') {
        const isFocusedOnInput = document.activeElement?.tagName === 'INPUT'
            && !document.activeElement.disabled;
        if (!isFocusedOnInput) {
            e.preventDefault();
            nextProblem();
        }
    }
});

loadProblem(0);
</script>
{% endblock %}
