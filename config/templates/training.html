{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="home-wrap">
    <a href="{% url 'index' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i>메인으로</a>

    <div class="section-header">
        <h3><i class="fas fa-user-graduate me-2"></i>재원생 메뉴</h3>
        <p class="section-desc">재원생을 위한 학습 훈련 도구</p>
    </div>

    <div class="menu-grid">
        <a href="{% url 'vocab:home' %}" class="menu-card">
            <div class="menu-card-icon"><i class="fas fa-layer-group" style="color:#0d9488;"></i></div>
            <h4>단어훈련</h4>
            <p>단어찾기(낱말카드 만들기) · 플래시카드 시험 · 별표 집중훈련</p>
        </a>

        <a href="{% url 'summary:home' %}" class="menu-card">
            <div class="menu-card-icon"><i class="fas fa-align-left" style="color:#7c3aed;"></i></div>
            <h4>요약문완성훈련</h4>
            <p>요약문 빈칸(ⓐ·ⓑ) 채우기 TEST · 선생님 채점</p>
        </a>

        <a href="{% url 'writing:home' %}" class="menu-card">
            <div class="menu-card-icon"><i class="fas fa-pen-nib"></i></div>
            <h4>영작훈련</h4>
            <p>단어별 빈칸 채우기 학습 · 대전</p>
        </a>

        <a href="{% url 'exam:home' %}" class="menu-card">
            <div class="menu-card-icon"><i class="fas fa-file-alt" style="color:#dc2626;"></i></div>
            <h4>모의고사</h4>
            <p>배정받은 모의고사 응시 · 1~5 입력 · 즉시 자동 채점</p>
        </a>
    </div>
</div>
{% endblock %}
