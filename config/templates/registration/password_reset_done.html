{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header text-center bg-success text-white">
                    <h2>메일 발송 완료</h2>
                </div>
                <div class="card-body p-4 text-center">
                    <p>입력하신 이메일로 <strong>아이디 안내</strong>와
                       <strong>비밀번호 재설정 링크</strong>를 보냈습니다.</p>
                    <p class="text-muted small">
                        메일이 보이지 않으면 스팸함도 확인해 주세요.<br>
                        링크는 발송 후 <strong>24시간</strong> 동안 유효합니다.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-primary mt-2">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
