{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header text-center bg-primary text-white">
                    <h2>아이디/비밀번호 찾기</h2>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small mb-3">
                        가입하신 이메일 주소를 입력하시면, 해당 이메일로
                        <strong>로그인 아이디</strong>와 <strong>비밀번호 재설정 링크</strong>를 보내드립니다.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">이메일</label>
                            <input type="email" name="email" id="id_email"
                                   class="form-control" required autofocus
                                   placeholder="가입하신 이메일">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">재설정 메일 보내기</button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <small><a href="{% url 'login' %}">로그인으로 돌아가기</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
