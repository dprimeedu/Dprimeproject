limit_req_zone $binary_remote_addr zone=mylimit:10m rate=20r/s;

server {
    listen 80;
    server_name dprimeedu.synology.me;

    location /static/ {
        alias /staticfiles/;
    }

    # 업로드 미디어 — nginx 컨테이너에 /media 마운트가 없어 Django 로 프록시.
    # (config/urls.py 에서 production 에서도 django.views.static.serve 로 /media/ 처리.)
    location /media/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 내신 빨파 정답 PDF — Django 인증 통과 후 X-Accel-Redirect 로만 도달.
    # 컨테이너에 /redblue_root (= /volume1/homes/admin/home/Drive/교재폴더, ro) 마운트 필요.
    location /redblue_internal/ {
        internal;
        alias /redblue_root/;
        add_header Content-Disposition inline;
    }

    location / {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        limit_req zone=mylimit burst=50 nodelay;
        limit_req_status 429;
    }

}