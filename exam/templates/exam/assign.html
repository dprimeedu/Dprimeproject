{% extends 'base.html' %}
{% block content %}
<div class="home-wrap" style="max-width:720px;">
    <a href="{% url 'exam:home' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i>시험</a>

    <div class="section-header">
        <h3><i class="fas fa-user-check me-2"></i>{{ title }} 배정</h3>
        <p class="section-desc">{{ question_count }}문항 · 현재 배정 {{ assigned_count }}명. 체크 후 저장하면 배정/해제됩니다.</p>
    </div>

    <form method="post" action="{% url 'exam:assign' paper.id %}">
        {% csrf_token %}
        {% if students %}
        <div class="card mb-3">
            <div class="list-group list-group-flush">
                {% for s in students %}
                <label class="list-group-item d-flex align-items-center gap-2">
                    <input class="form-check-input m-0" type="checkbox" name="student_ids" value="{{ s.id }}"
                           {% if s.is_assigned %}checked{% endif %}>
                    <span class="fw-semibold">{{ s.name }}</span>
                    {% if s.login_id %}<span class="text-muted small">({{ s.login_id }})</span>{% endif %}
                </label>
                {% endfor %}
            </div>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>배정 저장</button>
        </div>
        {% else %}
        <p class="text-muted">배정 가능한 학생이 없습니다.</p>
        {% endif %}
    </form>
</div>
{% endblock %}
