{# 학생 리포트 '오늘 한 것' 과목 칸 — label/icon/color/did/text/url #}
<div class="border rounded text-center p-2 h-100 {% if did %}bg-{{ color }}-subtle{% endif %}">
    <div class="text-{{ color }} fs-5"><i class="fas {{ icon }}"></i></div>
    <div class="fw-semibold small">{{ label }}</div>
    {% if did %}
        <div class="small text-muted">{{ text }}</div>
        <div class="text-success small mt-1"><i class="fas fa-check"></i> 완료</div>
    {% else %}
        <a href="{{ url }}" class="btn btn-sm btn-outline-{{ color }} mt-1">시작 →</a>
    {% endif %}
</div>
